name: Send Original Daily Note

on:
  schedule:
    # Runs at 04:30 UTC = 10:00 AM IST (Right before the Quiz!)
    - cron: '30 4 * * *'
  workflow_dispatch:

jobs:
  send_raw_note:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Send Daily Note Email
        env:
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python daily_mailer.py

      - name: Commit and Push Generated Note
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add Generated-Notes/
          git commit -m "Auto-publish: AI Deep Dive Note" || exit 0
          git push
